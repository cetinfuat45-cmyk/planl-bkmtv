<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planlı Bakım TV - Bakım HUB</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="pwa_icon_512_1777956810565.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: rgba(15, 23, 42, 0.8);
            --accent-aylik: #22d3ee;
            --accent-3aylik: #fbbf24;
            --accent-6aylik: #f87171;
            --accent-yillik: #a855f7;
            --done: #00FF00;
            --pending: #FF0000;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);

            /* Dinamik Ayarlar */
            --card-fs: 16px;
            --card-opacity: 1;
            --global-font: 'Roboto', sans-serif;
            --global-weight: 800;
            --modal-bg: #1e293b;
            --modal-text: #ffffff;
            --header-bg: rgba(0, 0, 0, 0.4);
            --panel-bg: rgba(15, 23, 42, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--global-font);
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        body {
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            width: 100%;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(15, 23, 42, 0.5) 0%, transparent 50%);
        }

        /* Header Area */
        .header {
            display: none;
        }

        /* Üst menüyü gizle */

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 40px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        .title-group h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .clock-area {
            text-align: right;
        }

        #digital-clock {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            flex: 1;
            display: flex;
            /* Grid yerine Flex kullanarak boş sütunların küçülmesini sağlıyoruz */
            gap: 15px;
            padding: 15px;
            overflow: hidden;
        }

        .column-panel {
            background: var(--panel-bg);
            border: 1px solid var(--text-main);
            /* Yazı rengiyle aynı kenarlık */
            opacity: 0.8;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1 1 0;
            /* Eşit dağıl ve büyü */
            transition: all 0.5s ease;
            min-width: 150px;
            align-self: stretch;
            /* En alta kadar uzan */
        }

        .column-panel.has-no-pending {
            flex: 0.3;
            /* Çok daha fazla daral */
            min-width: 100px;
            max-width: 200px;
            /* Maksimum genişlik sınırı */
            opacity: 0.4;
            /* Daha şeffaf */
            filter: grayscale(0.5);
            /* Renkleri biraz soldur */
        }

        .column-panel.has-no-pending .column-header {
            font-size: 12px;
            /* Başlık küçülsün */
            padding: 10px 5px;
        }

        .column-panel.has-no-pending .list-container {
            display: none;
            /* İçerik çok kalabalık yapmasın, sadece başlık ve dar sütun kalsın */
        }

        .column-header {
            padding: 15px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
        }

        .ch-aylik {
            color: var(--accent-aylik);
            border-color: var(--accent-aylik);
        }

        .ch-3aylik {
            color: var(--accent-3aylik);
            border-color: var(--accent-3aylik);
        }

        .ch-6aylik {
            color: var(--accent-6aylik);
            border-color: var(--accent-6aylik);
        }

        .ch-yillik {
            color: var(--accent-yillik);
            border-color: var(--accent-yillik);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: row;
            /* Yan yana dizilim */
            flex-wrap: wrap;
            /* Sığmayanlar alta geçsin */
            align-content: flex-start;
            justify-content: center;
            gap: 10px;
            /* Kartlar arası boşluk */
        }

        .list-container::-webkit-scrollbar {
            width: 6px;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Görünüm Modları */
        .dashboard-grid.row-mode .list-container {
            flex-direction: column;
            align-items: stretch;
        }

        .dashboard-grid.row-mode .item-card {
            width: 100%;
            max-width: 100%;
            margin-bottom: 5px;
        }

        .item-card {
            border-radius: 0px;
            /* Köşeli yapı */
            padding: 12px 18px;
            margin-bottom: 0;
            /* Boşluğu gap ile veriyoruz */
            text-align: center;
            font-weight: var(--global-weight);
            font-size: var(--card-fs);
            transition: all 0.4s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            border: 2px solid #000000;
            /* Siyah kenarlık */
            width: fit-content;
            /* Sadece metin kadar genişlik */
            min-width: 100px;
            /* Çok küçük metinlerde aşırı daralmaması için */
            max-width: 95%;
            /* Sütun dışına taşmaması için */
            min-height: auto;
            opacity: var(--card-opacity);
        }

        .item-card.is-pending {
            background: var(--pending);
            color: #ffffff;
        }

        .item-card.is-done {
            background: var(--done);
            color: #000000 !important;
            min-height: auto;
            font-size: 13px;
        }


        .item-name {
            line-height: 1.2;
        }


        /* Header */
        .footer {
            height: 60px;
            padding: 0 30px;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-main);
            border-bottom: 1px solid var(--text-main);
            /* Yazı rengiyle aynı kenarlık */
        }

        .sync-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            background: var(--done);
            border-radius: 50%;
        }

        /* Settings Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
            color: var(--modal-text);
        }

        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .setting-item {
            text-align: left;
        }

        .setting-label {
            color: var(--modal-text);
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        .setting-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: var(--modal-text);
            border: 1px solid rgba(128, 128, 128, 0.2);
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .theme-btn {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            transition: all 0.2s;
            background: rgba(128, 128, 128, 0.1);
            color: var(--modal-text);
        }

        .theme-btn.active {
            border-color: var(--accent-aylik);
            background: rgba(34, 211, 238, 0.1);
        }

        .theme-preview {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        .save-btn {
            background: var(--accent-aylik);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        .settings-trigger {
            cursor: pointer;
            color: var(--text-main);
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .settings-trigger:hover {
            opacity: 0.7;
        }

        .fullscreen-btn {
            cursor: pointer;
            color: var(--text-main);
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
        }

        .fullscreen-btn:hover {
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="footer">
        <div class="logo-area" style="gap: 5px; flex-direction: column; align-items: flex-start; justify-content: center;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="material-icons logo-icon" style="font-size: 24px;">fact_check</span>
                <h1 style="font-family: 'Orbitron'; font-size: 16px;">PLANLI BAKIM TV</h1>
            </div>
            <div class="sync-info" style="font-size: 10px; opacity: 0.7; padding-left: 34px;">
                <div class="sync-dot"></div>
                Bağlantı Aktif | <span id="last-sync">--:--:--</span>
            </div>
        </div>

        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 5px;">
            <img id="haftalik-resim-tv" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #fbbf24; display: none;" src="" alt="">
            <div id="haftalik-gorevli-tv" style="color: #fbbf24; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-align: center;"></div>
        </div>

        <div class="clock-area" style="display: flex; align-items: center; gap: 15px;">
            <div id="digital-clock" style="font-family: 'Orbitron'; font-size: 24px; font-weight: 700;">00:00:00</div>

            <div id="install-btn" class="settings-trigger"
                style="display:none; color: var(--accent-aylik); font-weight: bold; border: 1px solid var(--accent-aylik); padding: 5px 10px; border-radius: 6px;"
                onclick="installPWA()">
                <span class="material-icons" style="font-size: 20px;">download</span> YÜKLE
            </div>

            <div class="fullscreen-btn" onclick="toggleFullscreen()">
                <span class="material-icons" style="font-size: 24px;">fullscreen</span>
            </div>

            <div class="settings-trigger" onclick="openSettings()">
                <span class="material-icons" style="font-size: 24px;">settings</span>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- Aylık -->
        <div class="column-panel" id="panel-aylik">
            <div class="column-header ch-aylik">AYLIK BAKIMLAR</div>
            <div class="list-container" id="list-aylik"></div>
        </div>
        <!-- 3 Aylık -->
        <div class="column-panel" id="panel-3aylik">
            <div class="column-header ch-3aylik">3 AYLIK BAKIMLAR</div>
            <div class="list-container" id="list-3aylik"></div>
        </div>
        <!-- 6 Aylık -->
        <div class="column-panel" id="panel-6aylik">
            <div class="column-header ch-6aylik">6 AYLIK BAKIMLAR</div>
            <div class="list-container" id="list-6aylik"></div>
        </div>
        <!-- Yıllık -->
        <div class="column-panel" id="panel-yillik">
            <div class="column-header ch-yillik">YILLIK BAKIMLAR</div>
            <div class="list-container" id="list-yillik"></div>
        </div>
    </div>


    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <span class="material-icons" style="font-size: 48px; color: var(--accent-aylik);">settings</span>
            <h2 style="font-family: 'Orbitron'; margin: 10px 0;">AYARLAR</h2>

            <div class="settings-grid">
                <div class="setting-item">
                    <label class="setting-label">Arka Plan Teması</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div id="current-theme-preview" class="theme-preview" style="width: 40px; height: 40px;"></div>
                        <select id="theme-select" class="setting-input" onchange="updateThemePreview(this.value)">
                            <option value="#020617">Koyu Lacivert (Standart)</option>
                            <option value="#FF0000">Kırmızı</option>
                            <option value="#00FFFF">Camgöbeği</option>
                            <option value="#0000FF">Mavi</option>
                            <option value="#00008B">Koyu Mavi</option>
                            <option value="#ADD8E6">Açık Mavi</option>
                            <option value="#800080">Mor</option>
                            <option value="#FFFF00">Sarı</option>
                            <option value="#00FF00">Kireç</option>
                            <option value="#FF00FF">Macenta</option>
                            <option value="#FFC0CB">Pembe</option>
                            <option value="#FFFFFF">Beyaz</option>
                            <option value="#C0C0C0">Gümüş</option>
                            <option value="#808080">Gri</option>
                            <option value="#000000">Siyah</option>
                            <option value="#FFA500">Turuncu</option>
                            <option value="#A52A2A">Kahverengi</option>
                            <option value="#800000">Bordo</option>
                            <option value="#008000">Yeşil</option>
                            <option value="#808000">Zeytin</option>
                            <option value="#7FFFD4">Akuamarin</option>
                        </select>
                    </div>
                </div>

                <div class="setting-item">
                    <label class="setting-label">Yazı Karakteri (Font)</label>
                    <select id="font-select" class="setting-input">
                        <option value="'Roboto', sans-serif">Roboto (Standart)</option>
                        <option value="'Orbitron', sans-serif">Orbitron (Teknoloji)</option>
                        <option value="'Inter', sans-serif">Inter (Modern)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label class="setting-label">Yazı Kalınlığı</label>
                    <select id="weight-select" class="setting-input">
                        <option value="400">Normal</option>
                        <option value="700">Kalın</option>
                        <option value="900">Çok Kalın</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label class="setting-label">Görünüm Modu</label>
                    <select id="view-mode-select" class="setting-input">
                        <option value="card">Kart Görünümü (Yan Yana)</option>
                        <option value="row">Satır Görünümü (Liste)</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label class="setting-label">Kart Yazı Boyutu: <span id="v-card-fs">16px</span></label>
                    <input type="range" id="s-card-fs" min="10" max="40" value="16" class="setting-input"
                        oninput="document.getElementById('v-card-fs').innerText = this.value+'px'">
                </div>

                <div class="setting-item">
                    <label class="setting-label">Kart Şeffaflığı: <span id="v-card-op">100%</span></label>
                    <input type="range" id="s-card-op" min="0" max="1" step="0.1" value="1" class="setting-input"
                        oninput="document.getElementById('v-card-op').innerText = Math.round(this.value*100)+'%'">
                </div>

                <div class="setting-item">
                    <label class="setting-label">Sayfa Ölçeği (Zoom)</label>
                    <select id="zoom-select" class="setting-input">
                        <option value="0.5">50%</option>
                        <option value="0.75">75%</option>
                        <option value="1" selected>100%</option>
                        <option value="1.25">125%</option>
                        <option value="1.5">150%</option>
                    </select>
                </div>
            </div>

            <button class="save-btn" onclick="saveSettings()">AYARLARI KAYDET</button>
            <div style="margin-top: 15px; color: var(--text-dim); cursor: pointer; text-decoration: underline;"
                onclick="closeSettings()">İptal</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzSM87-ojx-OLD4MMoiRenA3wzU2CKrog-kDA9LDM1JV-nQAX1dXqimEH4fAw2l-fNP/exec';

        // Ayarlar İşlemleri
        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            updateThemePreview(document.getElementById('theme-select').value);
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function updateThemePreview(color) {
            document.getElementById('current-theme-preview').style.backgroundColor = color;
        }

        function saveSettings() {
            const settings = {
                theme: document.getElementById('theme-select').value,
                font: document.getElementById('font-select').value,
                weight: document.getElementById('weight-select').value,
                viewMode: document.getElementById('view-mode-select').value,
                cardFs: document.getElementById('s-card-fs').value + 'px',
                cardOp: document.getElementById('s-card-op').value,
                zoom: document.getElementById('zoom-select').value
            };
            localStorage.setItem('tv_settings', JSON.stringify(settings));
            applySettings();
            closeSettings();
        }

        function getBrightness(hexColor) {
            hexColor = hexColor.replace('#', '');
            const r = parseInt(hexColor.substr(0, 2), 16);
            const g = parseInt(hexColor.substr(2, 2), 16);
            const b = parseInt(hexColor.substr(4, 2), 16);
            return (r * 299 + g * 587 + b * 114) / 1000;
        }

        function applySettings() {
            const saved = localStorage.getItem('tv_settings');
            if (!saved) return;
            const s = JSON.parse(saved);
            const root = document.documentElement;

            // Tema ve Renk Mantığı
            const bgColor = s.theme || '#020617';
            root.style.setProperty('--bg-dark', bgColor);

            const brightness = getBrightness(bgColor);
            if (brightness > 125) {
                // Açık Renk Arka Plan
                root.style.setProperty('--text-main', '#000000');
                root.style.setProperty('--panel-bg', 'rgba(0,0,0,0.05)');
                root.style.setProperty('--header-bg', 'rgba(0,0,0,0.02)');
                root.style.setProperty('--modal-bg', '#ffffff');
                root.style.setProperty('--modal-text', '#000000');
                document.body.style.backgroundImage = 'none';
            } else {
                // Koyu Renk Arka Plan
                root.style.setProperty('--text-main', '#f8fafc');
                root.style.setProperty('--panel-bg', 'rgba(255, 255, 255, 0.05)');
                root.style.setProperty('--header-bg', 'rgba(0, 0, 0, 0.4)');
                root.style.setProperty('--modal-bg', '#1e293b');
                root.style.setProperty('--modal-text', '#ffffff');
                document.body.style.backgroundImage = '';
            }

            // CSS Değişkenleri
            root.style.setProperty('--global-font', s.font);
            root.style.setProperty('--global-weight', s.weight);
            root.style.setProperty('--card-fs', s.cardFs);
            root.style.setProperty('--card-opacity', s.cardOp);

            // Görünüm Modu
            const grid = document.querySelector('.dashboard-grid');
            if (s.viewMode === 'row') grid.classList.add('row-mode');
            else grid.classList.remove('row-mode');

            // Zoom
            document.body.style.zoom = s.zoom;

            // Formu Güncelle
            document.getElementById('theme-select').value = bgColor;
            document.getElementById('font-select').value = s.font;
            document.getElementById('weight-select').value = s.weight;
            document.getElementById('view-mode-select').value = s.viewMode || 'card';
            document.getElementById('s-card-fs').value = parseInt(s.cardFs);
            document.getElementById('v-card-fs').innerText = s.cardFs;
            document.getElementById('s-card-op').value = s.cardOp;
            document.getElementById('v-card-op').innerText = Math.round(s.cardOp * 100) + '%';
            document.getElementById('zoom-select').value = s.zoom;
            updateThemePreview(bgColor);
        }

        // İlk Yükleme
        window.addEventListener('load', applySettings);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Tam ekran hatası: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('tr-TR');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function fetchData() {
            fetch(API_URL + '?_t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    if (data.checklist) {
                        renderList('list-aylik', data.checklist.aylik, 'panel-aylik');
                        renderList('list-3aylik', data.checklist.ucAylik, 'panel-3aylik');
                        renderList('list-6aylik', data.checklist.altiAylik, 'panel-6aylik');
                        renderList('list-yillik', data.checklist.yillik, 'panel-yillik');
                    }
                    if (data.haftalikGorevli) {
                        document.getElementById('haftalik-gorevli-tv').innerText = data.haftalikGorevli;
                        
                        const imgEl = document.getElementById('haftalik-resim-tv');
                        if (data.haftalikGorevliResim) {
                            let imgUrl = data.haftalikGorevliResim;
                            const match = imgUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                            if (match && match[1] && !imgUrl.includes('uc?export')) {
                                imgUrl = 'https://drive.google.com/uc?export=view&id=' + match[1];
                            }
                            imgEl.src = imgUrl;
                            imgEl.style.display = 'block';
                        } else {
                            imgEl.style.display = 'none';
                        }
                    }
                    document.getElementById('last-sync').innerText = "Son Güncelleme: " + new Date().toLocaleTimeString('tr-TR');
                })
                .catch(err => console.error("Hata:", err));
        }

        function renderList(id, items, panelId) {
            const container = document.getElementById(id);
            const panel = document.getElementById(panelId);

            if (!items || items.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:20px; font-size:12px;">Kayıt yok.</div>';
                if (panel) panel.classList.add('has-no-pending');
                return;
            }

            // Bekleyen var mı kontrol et
            const hasPending = items.some(i => !i.status);
            if (panel) {
                if (hasPending) panel.classList.remove('has-no-pending');
                else panel.classList.add('has-no-pending');
            }

            // Önce BEKLEYENLER (FALSE), sonra YAPILANLAR (TRUE) gelsin
            const sorted = [...items].sort((a, b) => a.status - b.status);

            container.innerHTML = sorted.map(item => `
                <div class="item-card ${item.status ? 'is-done' : 'is-pending'}">
                    <div class="item-name">${item.name}</div>
                </div>
            `).join('');
        }

        fetchData();
        setInterval(fetchData, 60000);

        // PWA Yükleme Altyapısı
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'flex';
        });

        function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    document.getElementById('install-btn').style.display = 'none';
                }
                deferredPrompt = null;
            });
        }

        // Service Worker Kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Kayıtlı!'))
                    .catch(err => console.log('Service Worker Hatası:', err));
            });
        }
    </script>
</body>

</html>
