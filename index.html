<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planlı Bakım TV - Bakım HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: rgba(15, 23, 42, 0.8);
            --accent-aylik: #22d3ee;
            --accent-3aylik: #fbbf24;
            --accent-6aylik: #f87171;
            --accent-yillik: #a855f7;
            --done: #22c55e;
            --pending: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(15, 23, 42, 0.5) 0%, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Area */
        .header {
            height: 80px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 40px;
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        .title-group h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .clock-area {
            text-align: right;
        }

        #digital-clock {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        .column-panel {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .column-header {
            padding: 15px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
        }

        .ch-aylik { color: var(--accent-aylik); border-color: var(--accent-aylik); }
        .ch-3aylik { color: var(--accent-3aylik); border-color: var(--accent-3aylik); }
        .ch-6aylik { color: var(--accent-6aylik); border-color: var(--accent-6aylik); }
        .ch-yillik { color: var(--accent-yillik); border-color: var(--accent-yillik); }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .item-row.is-pending {
            border-left: 4px solid var(--pending);
            background: rgba(239, 68, 68, 0.05);
        }

        .item-row.is-done {
            border-left: 4px solid var(--done);
            opacity: 0.8;
        }

        .item-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            flex: 1;
            margin-right: 10px;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge-done {
            background: rgba(34, 197, 94, 0.2);
            color: var(--done);
            border: 1px solid var(--done);
        }

        .badge-pending {
            background: rgba(239, 68, 68, 0.2);
            color: var(--pending);
            border: 1px solid var(--pending);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Footer */
        .footer {
            height: 35px;
            padding: 0 30px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-dim);
        }

        .sync-info { display: flex; align-items: center; gap: 10px; }
        .sync-dot { width: 8px; height: 8px; background: var(--done); border-radius: 50%; }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <span class="material-icons logo-icon">fact_check</span>
            <div class="title-group">
                <h1>PLANLI BAKIM TAKİP TV</h1>
            </div>
        </div>
        <div class="clock-area">
            <div id="digital-clock">00:00:00</div>
            <div style="font-size: 14px; color: var(--text-dim);" id="current-date">-- --- ----</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <!-- Aylık -->
        <div class="column-panel">
            <div class="column-header ch-aylik">AYLIK BAKIMLAR</div>
            <div class="list-container" id="list-aylik"></div>
        </div>
        <!-- 3 Aylık -->
        <div class="column-panel">
            <div class="column-header ch-3aylik">3 AYLIK BAKIMLAR</div>
            <div class="list-container" id="list-3aylik"></div>
        </div>
        <!-- 6 Aylık -->
        <div class="column-panel">
            <div class="column-header ch-6aylik">6 AYLIK BAKIMLAR</div>
            <div class="list-container" id="list-6aylik"></div>
        </div>
        <!-- Yıllık -->
        <div class="column-panel">
            <div class="column-header ch-yillik">YILLIK BAKIMLAR</div>
            <div class="list-container" id="list-yillik"></div>
        </div>
    </div>

    <div class="footer">
        <div class="sync-info">
            <div class="sync-dot"></div>
            Sistem Bağlantısı Aktif | Veriler 60 sn'de bir güncellenir.
        </div>
        <div id="last-sync">Son Güncelleme: --:--:--</div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzSM87-ojx-OLD4MMoiRenA3wzU2CKrog-kDA9LDM1JV-nQAX1dXqimEH4fAw2l-fNP/exec';

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('tr-TR');
            document.getElementById('current-date').innerText = now.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function fetchData() {
            fetch(API_URL + '?_t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    if (data.checklist) {
                        renderList('list-aylik', data.checklist.aylik);
                        renderList('list-3aylik', data.checklist.ucAylik);
                        renderList('list-6aylik', data.checklist.altiAylik);
                        renderList('list-yillik', data.checklist.yillik);
                    }
                    document.getElementById('last-sync').innerText = "Son Güncelleme: " + new Date().toLocaleTimeString('tr-TR');
                })
                .catch(err => console.error("Hata:", err));
        }

        function renderList(id, items) {
            const container = document.getElementById(id);
            if (!items || items.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-dim); padding:20px;">Kayıt yok.</div>';
                return;
            }

            // Önce BEKLEYENLER (FALSE), sonra YAPILANLAR (TRUE) gelsin
            const sorted = [...items].sort((a, b) => a.status - b.status);

            container.innerHTML = sorted.map(item => `
                <div class="item-row ${item.status ? 'is-done' : 'is-pending'}">
                    <div class="item-name">${item.name}</div>
                    <div class="status-badge ${item.status ? 'badge-done' : 'badge-pending'}">
                        ${item.status ? 'YAPILDI' : 'BEKLİYOR'}
                    </div>
                </div>
            `).join('');
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
